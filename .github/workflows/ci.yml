name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --group dev
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/
    permissions:
      contents: read
    timeout-minutes: 60
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --group dev
      - run: uv run mypy src/
    permissions:
      contents: read
    timeout-minutes: 60
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --group dev --group release --locked
      - run: uv run pytest
      - run: uv run pyinstaller --clean --noconfirm it2ag.spec
      - run: test -x ./dist/it2ag/it2ag
      - run: test -d ./dist/it2ag/_internal
      - run: ./dist/it2ag/it2ag --help >/dev/null
      - run: ./dist/it2ag/it2ag --version | grep "^it2ag "
    permissions:
      contents: read
    timeout-minutes: 60
